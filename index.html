<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Kupony</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-main: #0a0a0c;
        --bg-panel: #121316;
        --bg-element: #1a1c21;
        --border: #2a2d35;
        --border-focus: #555d6b;

        --text-main: #ffffff;
        --text-muted: #8a93a0;
        --balance-live: #ffd84d;

        --win: #00e676;
        --win-bg: #052e18;
        --win-border: #0a522d;

        --lose: #ff4444;
        --lose-bg: #330e0e;
        --lose-border: #5c1818;

        --pending: #ffb300;
        --pending-bg: #332400;
        --pending-border: #5c4100;

        --cashout: #00b0ff;
        --cashout-bg: #0d2640;
        --cashout-border: #1a4d66;

        --font-main: "Inter", sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        border-radius: 0 !important;
      }

      body {
        background: var(--bg-main);
        color: var(--text-main);
        font-family: var(--font-main);
        font-size: 14px;
        min-height: 100vh;
      }

      .app-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        background: var(--bg-panel);
        border-right: 1px solid var(--border);
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
      }

      .current-date {
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 12px;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .field input {
        background: var(--bg-element);
        border: 1px solid var(--border);
        color: var(--text-main);
        padding: 12px;
        font-family: var(--font-main);
        font-size: 15px;
        outline: none;
        transition: border-color 0.15s;
        text-align: center;
      }

      .field input:focus {
        border-color: var(--border-focus);
      }

      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      input[type="number"] {
        appearance: textfield;
        -moz-appearance: textfield;
      }

      .btn-add {
        background: var(--text-main);
        color: var(--bg-main);
        border: none;
        padding: 14px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: background 0.15s;
        margin-top: 8px;
      }

      .btn-add:hover {
        background: #d0d4dc;
      }

      .main-content {
        padding: 30px 40px;
        display: flex;
        flex-direction: column;
        gap: 36px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 16px;
        width: 100%;
      }

      .stat-box {
        background: var(--bg-panel);
        border: 1px solid var(--border);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .stat-box .stat-lbl {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .stat-box .stat-val {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      .coupons-section {
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
      }

      .day-divider {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        border-bottom: 1px solid var(--border-focus);
        padding-bottom: 8px;
        margin-top: 32px;
        margin-bottom: 16px;
      }
      .day-divider:first-child {
        margin-top: 10px;
      }

      .day-date {
        font-size: 15px;
        font-weight: 800;
        color: var(--text-main);
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .day-balance {
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: color 0.3s ease;
      }

      .coupons-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .coupon-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--bg-panel);
        border: 1px solid var(--border);
        padding: 16px 20px;
      }

      .coupon-card.win {
        background: var(--win-bg);
        border-color: var(--win-border);
      }
      .coupon-card.lose {
        background: var(--lose-bg);
        border-color: var(--lose-border);
      }
      .coupon-card.pending {
        background: var(--pending-bg);
        border-color: var(--pending-border);
      }
      .coupon-card.cashout {
        background: var(--cashout-bg);
        border-color: var(--cashout-border);
      }

      .cc-data-group {
        display: grid;
        grid-template-columns: 70px 120px 120px 140px;
        gap: 20px;
        align-items: center;
        width: 100%;
      }

      .cc-tax-cell {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        min-width: 90px;
      }

      .cc-metric {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
        align-items: center;
        text-align: center;
      }

      .cc-lbl {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 0.5px;
      }

      .cc-val {
        font-size: 18px;
        font-weight: 800;
        color: #ffffff;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .cc-actions-group {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .status-actions {
        display: grid;
        grid-template-columns: repeat(2, 36px);
        grid-template-rows: repeat(2, 36px);
        gap: 6px;
        align-items: center;
        justify-content: center;
      }

      .btn-status {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--text-main);
        width: 36px;
        height: 36px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.12s;
        border-radius: 6px;
      }

      .btn-status:hover {
        transform: translateY(-1px);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      }

      .btn-status.active-win {
        background: var(--win);
        border-color: var(--win);
        color: #000;
      }
      .btn-status.active-lose {
        background: var(--lose);
        border-color: var(--lose);
        color: #fff;
      }
      .btn-status.active-pending {
        background: var(--pending);
        border-color: var(--pending);
        color: #000;
      }
      .btn-status.active-cashout {
        background: var(--cashout);
        border-color: var(--cashout);
        color: #000;
      }

      .btn-delete {
        background: transparent;
        border: 1px solid rgba(255, 68, 68, 0.4);
        color: var(--lose);
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-delete:hover {
        background: rgba(255, 68, 68, 0.15);
      }

      .tax-checkbox {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .tax-checkbox input[type="checkbox"] {
        display: none;
      }
      .tax-checkbox .box {
        width: 18px;
        height: 18px;
        border: 1px solid var(--border);
        background: var(--bg-panel);
        display: inline-block;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
      }
      .tax-checkbox .box::after {
        content: "";
        display: block;
        width: 10px;
        height: 10px;
        margin: 3px;
        background: transparent;
      }
      .tax-checkbox input[type="checkbox"]:checked + .box {
        background: var(--cashout);
        border-color: var(--cashout-border);
      }
      .tax-checkbox input[type="checkbox"]:checked + .box::after {
        background: #fff;
      }
      .tax-label {
        font-size: 12px;
        color: var(--text-muted);
        user-select: none;
      }

      .coupon-cashout-input {
        background: rgba(0, 176, 255, 0.15);
        border: 1px solid var(--cashout-border);
        color: var(--cashout);
        padding: 6px 8px;
        font-size: 11px;
        font-family: var(--font-main);
        font-weight: 700;
        outline: none;
        transition: border-color 0.15s;
        width: 60px;
        text-align: center;
      }

      .coupon-cashout-input:disabled {
        visibility: hidden;
        pointer-events: none;
      }

      .coupon-cashout-input:focus {
        border-color: var(--cashout);
        background: rgba(0, 176, 255, 0.25);
      }

      .coupon-cashout-input.hidden {
        display: none;
      }

      .stats-filter-group {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .filter-btn {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid var(--border);
        color: var(--text-main);
        padding: 8px 16px;
        font-size: 12px;
        font-weight: 600;
        font-family: var(--font-main);
        cursor: pointer;
        transition: all 0.15s;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .filter-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: var(--border-focus);
      }

      .filter-btn.active {
        background: var(--text-main);
        color: var(--bg-main);
        border-color: var(--text-main);
      }

      .empty-state {
        padding: 40px;
        text-align: center;
        color: var(--text-muted);
        background: var(--bg-panel);
        border: 1px dashed var(--border);
        font-weight: 500;
      }

      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--bg-element);
        border: 1px solid var(--border);
        padding: 16px 24px;
        font-weight: 600;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
        z-index: 999;
      }
      .toast.show {
        opacity: 1;
      }
      .toast.success {
        border-left: 4px solid var(--win);
      }
      .toast.error {
        border-left: 4px solid var(--lose);
      }

      @media (max-width: 1400px) {
        .stats-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      @media (max-width: 1000px) {
        .app-layout {
          grid-template-columns: 1fr;
        }
        .sidebar {
          height: auto;
          position: relative;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
        .main-content {
          padding: 20px;
        }
        .coupon-card {
          flex-direction: column;
          align-items: flex-start;
          gap: 20px;
        }
        .cc-data-group {
          width: 100%;
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 12px;
        }
        .cc-actions-group {
          width: 100%;
          justify-content: space-between;
        }
      }
      @media (max-width: 600px) {
        .stats-grid {
          grid-template-columns: 1fr 1fr;
        }
        .cc-data-group {
          grid-template-columns: 1fr;
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-layout">
      <div class="sidebar">
        <div class="current-date" id="headerDate"></div>

        <div class="field-group">
          <div class="field">
            <label>Data</label>
            <input type="date" id="f-date" />
          </div>

          <div class="field">
            <label>Kurs całkowity</label>
            <input
              type="number"
              id="f-odds"
              placeholder="Np. 2.50"
              step="0.01"
              min="1.00"
            />
          </div>

          <div class="field">
            <label>Stawka (zł)</label>
            <input
              type="number"
              id="f-stake"
              placeholder="Np. 100"
              step="1"
              min="0.01"
            />
          </div>

          <button class="btn-add" onclick="addCoupon()">Dodaj Kupon</button>

          <div class="field">
            <label>Kapitał wpłacony (zł)</label>
            <input
              type="number"
              id="f-deposited"
              placeholder="Np. 1000"
              step="1"
              min="0"
            />
          </div>

          <div class="field">
            <label>Kapitał wypłacony (zł)</label>
            <input
              type="number"
              id="f-withdrawn"
              placeholder="Np. 200"
              step="1"
              min="0"
            />
          </div>

          <div class="field">
            <label>Balans konta (zł)</label>
            <input
              type="number"
              id="f-account-balance"
              placeholder="Np. 1450"
              step="1"
            />
          </div>
        </div>
      </div>

      <div class="main-content">
        <div class="stats-filter-group">
          <button
            class="filter-btn active"
            onclick="setStatsFilter('all', this)"
          >
            Wszystko
          </button>
          <button class="filter-btn" onclick="setStatsFilter('day', this)">
            Dzisiaj
          </button>
          <button class="filter-btn" onclick="setStatsFilter('week', this)">
            Tydzień
          </button>
          <button class="filter-btn" onclick="setStatsFilter('month', this)">
            Miesiąc
          </button>
          <button class="filter-btn" onclick="setStatsFilter('year', this)">
            Rok
          </button>
        </div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-lbl">Balans Konta</div>
            <div
              class="stat-val"
              id="stat-balance"
              style="color: var(--balance-live)"
            >
              0.00 zł
            </div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Zysk / Strata</div>
            <div class="stat-val" id="stat-profit">0.00 zł</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Yield</div>
            <div class="stat-val" id="stat-yield">0.0%</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Średni Kurs</div>
            <div class="stat-val" id="stat-avg-odds">0.00</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Liczba kuponów</div>
            <div class="stat-val" id="stat-count">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Skuteczność (W/L)</div>
            <div class="stat-val" id="stat-wr">0%</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Bilans (W / L / C / ?)</div>
            <div class="stat-val" id="stat-counts">0 / 0 / 0 / 0</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Postawiono razem</div>
            <div class="stat-val" id="stat-total-stake">0.00 zł</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Średnia stawka</div>
            <div class="stat-val" id="stat-avg-stake">0.00 zł</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Średni wynik</div>
            <div class="stat-val" id="stat-avg-result">0.00 zł</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Największy zysk</div>
            <div class="stat-val" id="stat-max-win">0.00 zł</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Największa strata</div>
            <div class="stat-val" id="stat-max-loss">0.00 zł</div>
          </div>
        </div>

        <div class="coupons-section">
          <div class="coupons-list" id="coupons-container"></div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      let coupons = JSON.parse(localStorage.getItem("bt_coupons_v3") || "[]");
      let deposited =
        parseFloat(
          localStorage.getItem("bt_deposited") ||
            localStorage.getItem("bt_capital") ||
            "0",
        ) || 0;
      let withdrawn =
        parseFloat(localStorage.getItem("bt_withdrawn") || "0") || 0;
      let accountBalanceRaw = localStorage.getItem("bt_account_balance");
      let accountBalance =
        accountBalanceRaw === null || accountBalanceRaw === ""
          ? null
          : Number.isFinite(parseFloat(accountBalanceRaw))
            ? parseFloat(accountBalanceRaw)
            : null;
      let statsFilter = "all";

      function readOptionalNumber(value) {
        if (value === null || value === "") return null;
        const parsed = parseFloat(value);
        return Number.isFinite(parsed) ? parsed : null;
      }

      function save() {
        localStorage.setItem("bt_coupons_v3", JSON.stringify(coupons));
      }

      const today = () => new Date().toISOString().slice(0, 10);

      function getFilteredCoupons() {
        const now = new Date();
        const dzis = new Date(now.getFullYear(), now.getMonth(), now.getDate());

        if (statsFilter === "all") return coupons;

        return coupons.filter((c) => {
          const couponDate = new Date(c.date);
          const couponDateOnly = new Date(
            couponDate.getFullYear(),
            couponDate.getMonth(),
            couponDate.getDate(),
          );

          if (statsFilter === "day") {
            return couponDateOnly.getTime() === dzis.getTime();
          } else if (statsFilter === "week") {
            const weekAgo = new Date(dzis);
            weekAgo.setDate(weekAgo.getDate() - 7);
            return couponDateOnly >= weekAgo && couponDateOnly <= dzis;
          } else if (statsFilter === "month") {
            return (
              couponDate.getFullYear() === now.getFullYear() &&
              couponDate.getMonth() === now.getMonth()
            );
          } else if (statsFilter === "year") {
            return couponDate.getFullYear() === now.getFullYear();
          }
          return true;
        });
      }

      function formatDatePL(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString("pl-PL", {
          day: "numeric",
          month: "long",
          year: "numeric",
        });
      }

      function getPayout(c) {
        let initialStake = c.stake;
        let stakeAfterTax = c.tax ? initialStake * 0.88 : initialStake;
        let possibleWin = stakeAfterTax * c.odds;
        let payout = possibleWin;

        if (possibleWin > 2280) {
          let taxBase = Math.round(possibleWin);
          let taxAmount = Math.round(taxBase * 0.1);
          payout = possibleWin - taxAmount;
        }
        return payout;
      }

      document.getElementById("f-date").value = today();
      document.getElementById("headerDate").textContent = formatDatePL(
        new Date(),
      );
      document.getElementById("f-deposited").value =
        deposited > 0 ? deposited : "";
      document.getElementById("f-withdrawn").value =
        withdrawn > 0 ? withdrawn : "";
      document.getElementById("f-account-balance").value =
        accountBalance !== null ? accountBalance : "";

      document.getElementById("f-deposited").addEventListener("input", (e) => {
        const val = parseFloat(e.target.value) || 0;
        deposited = val;
        localStorage.setItem("bt_deposited", val.toString());
        renderStats();
      });

      document.getElementById("f-withdrawn").addEventListener("input", (e) => {
        const val = parseFloat(e.target.value) || 0;
        withdrawn = val;
        localStorage.setItem("bt_withdrawn", val.toString());
        renderStats();
      });

      document
        .getElementById("f-account-balance")
        .addEventListener("input", (e) => {
          const val = readOptionalNumber(e.target.value);
          accountBalance = val;
          if (val === null) {
            localStorage.removeItem("bt_account_balance");
          } else {
            localStorage.setItem("bt_account_balance", val.toString());
          }
          renderStats();
        });

      function fmt(n) {
        return parseFloat(n).toLocaleString("pl-PL", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });
      }

      function addCoupon() {
        const date = document.getElementById("f-date").value;
        const odds = parseFloat(document.getElementById("f-odds").value);
        const stake = parseFloat(document.getElementById("f-stake").value);

        if (!date || !odds || !stake) {
          toast("Wypełnij datę, kurs i stawkę!", "error");
          return;
        }
        if (odds < 1) {
          toast("Kurs nie może być mniejszy niż 1.00", "error");
          return;
        }
        if (stake <= 0) {
          toast("Stawka musi być większa niż 0", "error");
          return;
        }

        const profit = parseFloat((odds * stake - stake).toFixed(2));

        coupons.unshift({
          id: Date.now().toString(),
          date,
          odds,
          stake,
          profit,
          status: "pending",
          cashout: 0,
          tax: false,
        });

        save();
        renderAll();
        toast("Dodano kupon", "success");

        document.getElementById("f-odds").value = "";
        document.getElementById("f-stake").value = "";
      }

      function setStatus(id, status) {
        const c = coupons.find((x) => x.id === id);
        if (c) {
          c.status = status;
          if (status !== "cashout") {
            c.cashout = 0;
          }
          save();
          renderAll();
        }
      }

      function setCashout(id, amount) {
        const c = coupons.find((x) => x.id === id);
        if (c) {
          c.cashout = parseFloat(amount) || 0;
          save();

          let payout = parseFloat(c.cashout) || 0;
          const finalResult = payout - c.stake;

          const resultEl = document.getElementById(`result-${c.id}`);
          if (resultEl) {
            resultEl.textContent =
              (finalResult > 0 ? "+" : "") + fmt(finalResult) + " zł";
            resultEl.style.color =
              finalResult > 0
                ? "var(--win)"
                : finalResult < 0
                  ? "var(--lose)"
                  : "#ffffff";
          }

          // Używamy tylko tego, aby nie tracić ostrości (focusu) w polu input
          renderStats();
          updateDayBalance(c.date);
        }
      }

      function toggleTax(id, checked) {
        const c = coupons.find((x) => x.id === id);
        if (c) {
          c.tax = !!checked;
          save();
          renderAll();
        }
      }

      function deleteCoupon(id) {
        if (!confirm("Czy na pewno chcesz usunąć ten kupon?")) return;
        coupons = coupons.filter((x) => x.id !== id);
        save();
        renderAll();
      }

      function updateDayBalance(targetDate) {
        const filtered = getFilteredCoupons();
        const dayCoupons = filtered.filter((c) => c.date === targetDate);
        let dayBalance = 0;

        dayCoupons.forEach((c) => {
          if (c.status === "win") {
            dayBalance += getPayout(c) - c.stake;
          } else if (c.status === "lose") {
            dayBalance -= c.stake;
          } else if (c.status === "cashout") {
            let payout = parseFloat(c.cashout) || 0;
            dayBalance += payout - c.stake;
          } else if (c.status === "pending") {
            dayBalance -= c.stake;
          }
        });

        const balEl = document.getElementById(`day-balance-${targetDate}`);
        if (balEl) {
          let balColor = "var(--text-main)";
          let balPrefix = "";
          if (dayBalance > 0) {
            balColor = "var(--win)";
            balPrefix = "+";
          } else if (dayBalance < 0) {
            balColor = "var(--lose)";
          }
          balEl.textContent = `Bilans: ${balPrefix}${fmt(dayBalance)} zł`;
          balEl.style.color = balColor;
        }
      }

      function renderStats() {
        const filtered = getFilteredCoupons();
        const resolved = filtered.filter((c) => c.status !== "pending");
        const wins = filtered.filter((c) => c.status === "win");
        const losses = filtered.filter((c) => c.status === "lose");
        const pending = filtered.filter((c) => c.status === "pending");
        const cashouts = filtered.filter((c) => c.status === "cashout");

        const totalStake = filtered.reduce((s, c) => s + c.stake, 0);
        const pendingStake = pending.reduce((s, c) => s + c.stake, 0);
        const resolvedStake = resolved.reduce((s, c) => s + c.stake, 0);
        const avgStake = filtered.length ? totalStake / filtered.length : 0;

        let totalProfit = 0;
        let maxWin = 0;
        let maxLoss = 0;

        resolved.forEach((c) => {
          if (c.status === "win") {
            const finalProfit = getPayout(c) - c.stake;
            totalProfit += finalProfit;
            maxWin = Math.max(maxWin, finalProfit);
          } else if (c.status === "lose") {
            totalProfit -= c.stake;
            maxLoss = Math.min(maxLoss, -c.stake);
          } else if (c.status === "cashout") {
            let payout = parseFloat(c.cashout) || 0;
            const finalResult = payout - c.stake;
            totalProfit += finalResult;
            if (finalResult > 0) maxWin = Math.max(maxWin, finalResult);
            else if (finalResult < 0) maxLoss = Math.min(maxLoss, finalResult);
          }
        });

        const avgResult = resolved.length ? totalProfit / resolved.length : 0;
        const netCapital = deposited - withdrawn;
        const hasManualBalance = accountBalance !== null;

        const baseCapital = hasManualBalance ? accountBalance : netCapital;
        const balance = baseCapital + totalProfit - pendingStake;

        const yieldPct =
          resolvedStake > 0 ? (totalProfit / resolvedStake) * 100 : 0;

        const winRate = resolved.length
          ? (wins.length / resolved.length) * 100
          : 0;
        const avgOdds = filtered.length
          ? filtered.reduce((s, c) => s + c.odds, 0) / filtered.length
          : 0;

        const balEl = document.getElementById("stat-balance");
        balEl.textContent = fmt(balance) + " zł";
        balEl.style.color = "var(--balance-live)";

        const pEl = document.getElementById("stat-profit");
        pEl.textContent =
          (totalProfit > 0 ? "+" : "") + fmt(totalProfit) + " zł";
        pEl.style.color =
          totalProfit > 0
            ? "var(--win)"
            : totalProfit < 0
              ? "var(--lose)"
              : "var(--text-main)";

        const yieldEl = document.getElementById("stat-yield");
        yieldEl.textContent =
          (yieldPct > 0 ? "+" : "") + yieldPct.toFixed(1) + "%";
        yieldEl.style.color =
          yieldPct > 0
            ? "var(--win)"
            : yieldPct < 0
              ? "var(--lose)"
              : "var(--text-main)";

        document.getElementById("stat-count").textContent = filtered.length;
        document.getElementById("stat-avg-odds").textContent =
          avgOdds.toFixed(2);
        document.getElementById("stat-wr").textContent =
          winRate.toFixed(0) + "%";
        document.getElementById("stat-counts").textContent =
          `${wins.length} / ${losses.length} / ${cashouts.length} / ${pending.length}`;
        document.getElementById("stat-total-stake").textContent =
          fmt(totalStake) + " zł";
        document.getElementById("stat-avg-stake").textContent =
          fmt(avgStake) + " zł";

        const avgResEl = document.getElementById("stat-avg-result");
        avgResEl.textContent =
          (avgResult > 0 ? "+" : "") + fmt(avgResult) + " zł";
        avgResEl.style.color =
          avgResult > 0
            ? "var(--win)"
            : avgResult < 0
              ? "var(--lose)"
              : "var(--text-main)";

        const maxWinEl = document.getElementById("stat-max-win");
        maxWinEl.textContent = maxWin > 0 ? "+" + fmt(maxWin) + " zł" : "—";
        maxWinEl.style.color = maxWin > 0 ? "var(--win)" : "var(--text-muted)";

        const maxLossEl = document.getElementById("stat-max-loss");
        maxLossEl.textContent = maxLoss < 0 ? fmt(maxLoss) + " zł" : "—";
        maxLossEl.style.color =
          maxLoss < 0 ? "var(--lose)" : "var(--text-muted)";
      }

      function renderCoupons() {
        const container = document.getElementById("coupons-container");
        const filtered = getFilteredCoupons();
        if (!filtered.length) {
          container.innerHTML = `<div class="empty-state">Nie dodano jeszcze żadnych kuponów.</div>`;
          return;
        }

        const byDate = {};
        filtered.forEach((c) => {
          if (!byDate[c.date]) byDate[c.date] = [];
          byDate[c.date].push(c);
        });

        const sortedDates = Object.keys(byDate).sort((a, b) =>
          b.localeCompare(a),
        );
        let html = "";

        sortedDates.forEach((date) => {
          let dayBalance = 0;

          byDate[date].forEach((c) => {
            if (c.status === "win") {
              dayBalance += getPayout(c) - c.stake;
            } else if (c.status === "lose") {
              dayBalance -= c.stake;
            } else if (c.status === "cashout") {
              let payout = parseFloat(c.cashout) || 0;
              dayBalance += payout - c.stake;
            } else if (c.status === "pending") {
              dayBalance -= c.stake;
            }
          });

          let balColor = "var(--text-main)";
          let balPrefix = "";
          if (dayBalance > 0) {
            balColor = "var(--win)";
            balPrefix = "+";
          } else if (dayBalance < 0) {
            balColor = "var(--lose)";
          }

          const formattedDate = formatDatePL(date);

          html += `
            <div class="day-divider">
              <div class="day-date">${formattedDate}</div>
              <div class="day-balance" id="day-balance-${date}" style="color: ${balColor}">Bilans: ${balPrefix}${fmt(dayBalance)} zł</div>
            </div>
          `;

          byDate[date].forEach((c) => {
            let possibleWin = getPayout(c);
            let pendingTaxes = [];

            let initialStake = c.stake;
            let stakeAfterTax = c.tax ? initialStake * 0.88 : initialStake;
            let rawWin = stakeAfterTax * c.odds;
            if (c.tax) pendingTaxes.push("12%");
            if (rawWin > 2280) pendingTaxes.push("10%");

            let resultVal = "—";
            let resultColor = "#ffffff";
            let extraNoteHtml = "";

            if (c.status === "pending" && pendingTaxes.length > 0) {
              extraNoteHtml = `<div class="cc-note" style="font-size:10px;color:var(--text-muted);margin-top:2px">Możliwy podatek: ${pendingTaxes.join(" + ")}</div>`;
            }

            if (c.status === "win") {
              const finalProfit = possibleWin - c.stake;
              if (pendingTaxes.length > 0) {
                extraNoteHtml = `<div class="cc-note" style="font-size:10px;color:var(--text-muted);margin-top:2px">Podatek: ${pendingTaxes.join(" + ")}</div>`;
              }
              resultVal =
                (finalProfit > 0 ? "+" : "") + fmt(finalProfit) + " zł";
              resultColor = "var(--win)";
            } else if (c.status === "lose") {
              resultVal = "-" + fmt(c.stake) + " zł";
              resultColor = "var(--lose)";
            } else if (c.status === "cashout") {
              let payout = parseFloat(c.cashout) || 0;
              const finalCashout = payout - c.stake;
              resultVal =
                (finalCashout > 0 ? "+" : "") + fmt(finalCashout) + " zł";
              resultColor =
                finalCashout > 0
                  ? "var(--win)"
                  : finalCashout < 0
                    ? "var(--lose)"
                    : "#ffffff";
            }

            let cashoutInputHtml = "";
            if (c.status === "cashout") {
              cashoutInputHtml = `<input type="number" class="coupon-cashout-input" placeholder="Kwota" value="${c.cashout || 0}" oninput="setCashout('${c.id}', this.value)" min="0" step="1" max="99999" />`;
            } else {
              cashoutInputHtml = `<input type="number" class="coupon-cashout-input" disabled />`;
            }

            html += `
              <div class="coupon-card ${c.status}">
                <div class="cc-data-group">
                  <div class="cc-tax-cell">
                    <label class="tax-checkbox"><input type="checkbox" onchange="toggleTax('${c.id}', this.checked)" ${c.tax ? "checked" : ""}><span class="box"></span></label>
                    <div class="tax-label">Podatek</div>
                  </div>
                  <div class="cc-metric">
                    <div class="cc-lbl">Kurs</div>
                    <div class="cc-val">${c.odds.toFixed(2)}</div>
                  </div>
                  <div class="cc-metric">
                    <div class="cc-lbl">Stawka</div>
                    <div class="cc-val">${fmt(c.stake)} zł</div>
                  </div>
                  <div class="cc-metric" style="min-width: 100px;">
                    <div class="cc-lbl">Wynik</div>
                    <div class="cc-val" id="result-${c.id}" style="color: ${resultColor}">${resultVal}</div>
                    <div id="note-${c.id}">${extraNoteHtml}</div>
                  </div>
                </div>

                <div class="cc-actions-group">
                  <div class="status-actions">
                    <button class="btn-status ${c.status === "win" ? "active-win" : ""}" onclick="setStatus('${c.id}', 'win')">W</button>
                    <button class="btn-status ${c.status === "lose" ? "active-lose" : ""}" onclick="setStatus('${c.id}', 'lose')">L</button>
                    <button class="btn-status ${c.status === "pending" ? "active-pending" : ""}" onclick="setStatus('${c.id}', 'pending')">?</button>
                    <button class="btn-status ${c.status === "cashout" ? "active-cashout" : ""}" onclick="setStatus('${c.id}', 'cashout')">C</button>
                  </div>
                  ${cashoutInputHtml}
                  <button class="btn-delete" onclick="deleteCoupon('${c.id}')">Usuń</button>
                </div>
              </div>
            `;
          });
        });

        container.innerHTML = html;
      }

      function setStatsFilter(filter, btn) {
        statsFilter = filter;
        document.querySelectorAll(".filter-btn").forEach((b) => {
          b.classList.remove("active");
        });
        if (btn && btn.classList) btn.classList.add("active");
        renderStats();
        renderCoupons();
      }

      function toast(msg, type) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = "toast show " + (type || "");
        setTimeout(() => (el.className = "toast"), 2500);
      }

      function renderAll() {
        renderStats();
        renderCoupons();
      }

      renderAll();
    </script>
  </body>
</html>
