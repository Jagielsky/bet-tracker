<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Kupony</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-main: #0a0a0c;
        --bg-panel: #121316;
        --bg-element: #1a1c21;
        --border: #2a2d35;
        --border-focus: #555d6b;

        --text-main: #ffffff;
        --text-muted: #8a93a0;

        --win: #00e676;
        --win-bg: #052e18;
        --win-border: #0a522d;

        --lose: #ff4444;
        --lose-bg: #330e0e;
        --lose-border: #5c1818;

        --pending: #ffb300;
        --pending-bg: #332400;
        --pending-border: #5c4100;

        --font-main: "Inter", sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        border-radius: 0 !important;
      }

      body {
        background: var(--bg-main);
        color: var(--text-main);
        font-family: var(--font-main);
        font-size: 14px;
        min-height: 100vh;
      }

      .app-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        background: var(--bg-panel);
        border-right: 1px solid var(--border);
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
      }

      .current-date {
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 12px;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .field input {
        background: var(--bg-element);
        border: 1px solid var(--border);
        color: var(--text-main);
        padding: 12px;
        font-family: var(--font-main);
        font-size: 15px;
        outline: none;
        transition: border-color 0.15s;
        text-align: center;
      }

      .field input:focus {
        border-color: var(--border-focus);
      }

      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      input[type="number"] {
        appearance: textfield;
        -moz-appearance: textfield;
      }

      .btn-add {
        background: var(--text-main);
        color: var(--bg-main);
        border: none;
        padding: 14px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: background 0.15s;
        margin-top: 8px;
      }

      .btn-add:hover {
        background: #d0d4dc;
      }

      .main-content {
        padding: 30px 40px;
        display: flex;
        flex-direction: column;
        gap: 36px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 16px;
        width: 100%;
      }

      .stat-box {
        background: var(--bg-panel);
        border: 1px solid var(--border);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .stat-box .stat-lbl {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .stat-box .stat-val {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      .coupons-section {
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
      }

      .day-divider {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        border-bottom: 1px solid var(--border-focus);
        padding-bottom: 8px;
        margin-top: 32px;
        margin-bottom: 16px;
      }
      .day-divider:first-child {
        margin-top: 10px;
      }

      .day-date {
        font-size: 15px;
        font-weight: 800;
        color: var(--text-main);
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .day-balance {
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .coupons-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .coupon-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--bg-panel);
        border: 1px solid var(--border);
        padding: 16px 20px;
      }

      .coupon-card.win {
        background: var(--win-bg);
        border-color: var(--win-border);
      }
      .coupon-card.lose {
        background: var(--lose-bg);
        border-color: var(--lose-border);
      }
      .coupon-card.pending {
        background: var(--pending-bg);
        border-color: var(--pending-border);
      }

      .cc-data-group {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 24px;
        align-items: center;
        width: 100%;
      }

      .cc-metric {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
        align-items: center;
        text-align: center;
      }

      .cc-lbl {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 0.5px;
      }

      .cc-val {
        font-size: 18px;
        font-weight: 800;
        color: #ffffff;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .cc-actions-group {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .status-actions {
        display: flex;
        gap: 4px;
      }

      .btn-status {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-main);
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s;
      }

      .btn-status:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      .btn-status.active-win {
        background: var(--win);
        border-color: var(--win);
        color: #000;
      }
      .btn-status.active-lose {
        background: var(--lose);
        border-color: var(--lose);
        color: #fff;
      }
      .btn-status.active-pending {
        background: var(--pending);
        border-color: var(--pending);
        color: #000;
      }

      .btn-delete {
        background: transparent;
        border: 1px solid rgba(255, 68, 68, 0.4);
        color: var(--lose);
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-delete:hover {
        background: rgba(255, 68, 68, 0.15);
      }

      .empty-state {
        padding: 40px;
        text-align: center;
        color: var(--text-muted);
        background: var(--bg-panel);
        border: 1px dashed var(--border);
        font-weight: 500;
      }

      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--bg-element);
        border: 1px solid var(--border);
        padding: 16px 24px;
        font-weight: 600;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
        z-index: 999;
      }
      .toast.show {
        opacity: 1;
      }
      .toast.success {
        border-left: 4px solid var(--win);
      }
      .toast.error {
        border-left: 4px solid var(--lose);
      }

      @media (max-width: 1400px) {
        .stats-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      @media (max-width: 1000px) {
        .app-layout {
          grid-template-columns: 1fr;
        }
        .sidebar {
          height: auto;
          position: relative;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
        .main-content {
          padding: 20px;
        }
        .coupon-card {
          flex-direction: column;
          align-items: flex-start;
          gap: 20px;
        }
        .cc-data-group {
          width: 100%;
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 12px;
        }
        .cc-actions-group {
          width: 100%;
          justify-content: space-between;
        }
      }
      @media (max-width: 600px) {
        .stats-grid {
          grid-template-columns: 1fr 1fr;
        }
        .cc-data-group {
          grid-template-columns: 1fr;
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-layout">
      <div class="sidebar">
        <div class="current-date" id="headerDate"></div>

        <div class="field-group">
          <div class="field">
            <label>Data</label>
            <input type="date" id="f-date" />
          </div>

          <div class="field">
            <label>Kurs całkowity</label>
            <input
              type="number"
              id="f-odds"
              placeholder="Np. 2.50"
              step="0.01"
              min="1.00"
            />
          </div>

          <div class="field">
            <label>Stawka (zł)</label>
            <input
              type="number"
              id="f-stake"
              placeholder="Np. 100"
              step="1"
              min="0.01"
            />
          </div>

          <button class="btn-add" onclick="addCoupon()">Dodaj Kupon</button>
        </div>
      </div>

      <div class="main-content">
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-lbl">Zysk / Strata</div>
            <div class="stat-val" id="stat-profit">0.00 zł</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Yield</div>
            <div class="stat-val" id="stat-yield">0.0%</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Zainwestowano</div>
            <div class="stat-val" id="stat-invested">0.00 zł</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Średni Kurs</div>
            <div class="stat-val" id="stat-avg-odds">0.00</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Skuteczność (W/L)</div>
            <div class="stat-val" id="stat-wr">0%</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Bilans (W / L / ?)</div>
            <div class="stat-val" id="stat-counts">0 / 0 / 0</div>
          </div>
        </div>

        <div class="coupons-section">
          <div class="coupons-list" id="coupons-container"></div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      let coupons = JSON.parse(localStorage.getItem("bt_coupons_v3") || "[]");

      function save() {
        localStorage.setItem("bt_coupons_v3", JSON.stringify(coupons));
      }

      const today = () => new Date().toISOString().slice(0, 10);

      // Funkcja formatująca datę z YYYY-MM-DD na polski format (np. 5 maja 2026)
      function formatDatePL(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString("pl-PL", {
          day: "numeric",
          month: "long",
          year: "numeric",
        });
      }

      document.getElementById("f-date").value = today();
      document.getElementById("headerDate").textContent = formatDatePL(
        new Date(),
      );

      function fmt(n) {
        return parseFloat(n).toLocaleString("pl-PL", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });
      }

      function addCoupon() {
        const date = document.getElementById("f-date").value;
        const odds = parseFloat(document.getElementById("f-odds").value);
        const stake = parseFloat(document.getElementById("f-stake").value);

        if (!date || !odds || !stake) {
          toast("Wypełnij datę, kurs i stawkę!", "error");
          return;
        }
        if (odds < 1) {
          toast("Kurs nie może być mniejszy niż 1.00", "error");
          return;
        }
        if (stake <= 0) {
          toast("Stawka musi być większa niż 0", "error");
          return;
        }

        const profit = parseFloat((odds * stake - stake).toFixed(2));

        coupons.unshift({
          id: Date.now().toString(),
          date,
          odds,
          stake,
          profit,
          status: "pending",
        });

        save();
        renderAll();
        toast("Dodano kupon", "success");

        document.getElementById("f-odds").value = "";
        document.getElementById("f-stake").value = "";
      }

      function setStatus(id, status) {
        const c = coupons.find((x) => x.id === id);
        if (c) {
          c.status = status;
          save();
          renderAll();
        }
      }

      function deleteCoupon(id) {
        if (!confirm("Czy na pewno chcesz usunąć ten kupon?")) return;
        coupons = coupons.filter((x) => x.id !== id);
        save();
        renderAll();
      }

      function renderStats() {
        const resolved = coupons.filter((c) => c.status !== "pending");
        const wins = coupons.filter((c) => c.status === "win");
        const losses = coupons.filter((c) => c.status === "lose");
        const pending = coupons.filter((c) => c.status === "pending");

        const totalStake = coupons.reduce((s, c) => s + c.stake, 0);

        let totalProfit = 0;
        resolved.forEach((c) => {
          if (c.status === "win") totalProfit += c.profit;
          else if (c.status === "lose") totalProfit -= c.stake;
        });

        const yieldPct = totalStake > 0 ? (totalProfit / totalStake) * 100 : 0;
        const winRate = resolved.length
          ? (wins.length / resolved.length) * 100
          : 0;
        const avgOdds = coupons.length
          ? coupons.reduce((s, c) => s + c.odds, 0) / coupons.length
          : 0;

        const pEl = document.getElementById("stat-profit");
        pEl.textContent =
          (totalProfit > 0 ? "+" : "") + fmt(totalProfit) + " zł";
        pEl.style.color =
          totalProfit > 0
            ? "var(--win)"
            : totalProfit < 0
              ? "var(--lose)"
              : "var(--text-main)";

        const yieldEl = document.getElementById("stat-yield");
        yieldEl.textContent =
          (yieldPct > 0 ? "+" : "") + yieldPct.toFixed(1) + "%";
        yieldEl.style.color =
          yieldPct > 0
            ? "var(--win)"
            : yieldPct < 0
              ? "var(--lose)"
              : "var(--text-main)";

        document.getElementById("stat-invested").textContent =
          fmt(totalStake) + " zł";
        document.getElementById("stat-avg-odds").textContent =
          avgOdds.toFixed(2);
        document.getElementById("stat-wr").textContent =
          winRate.toFixed(0) + "%";
        document.getElementById("stat-counts").textContent =
          `${wins.length} / ${losses.length} / ${pending.length}`;
      }

      function renderCoupons() {
        const container = document.getElementById("coupons-container");
        if (!coupons.length) {
          container.innerHTML = `<div class="empty-state">Nie dodano jeszcze żadnych kuponów.</div>`;
          return;
        }

        // Grupowanie według daty
        const byDate = {};
        coupons.forEach((c) => {
          if (!byDate[c.date]) byDate[c.date] = [];
          byDate[c.date].push(c);
        });

        // Sortowanie dat od najnowszej
        const sortedDates = Object.keys(byDate).sort((a, b) =>
          b.localeCompare(a),
        );

        let html = "";

        sortedDates.forEach((date) => {
          // Obliczanie bilansu z danego dnia
          let dayBalance = 0;
          byDate[date].forEach((c) => {
            if (c.status === "win") dayBalance += c.profit;
            else if (c.status === "lose") dayBalance -= c.stake;
          });

          let balColor = "var(--text-main)";
          let balPrefix = "";
          if (dayBalance > 0) {
            balColor = "var(--win)";
            balPrefix = "+";
          } else if (dayBalance < 0) {
            balColor = "var(--lose)";
          }

          const formattedDate = formatDatePL(date);

          html += `
            <div class="day-divider">
              <div class="day-date">${formattedDate}</div>
              <div class="day-balance" style="color: ${balColor}">Bilans: ${balPrefix}${fmt(dayBalance)} zł</div>
            </div>
          `;

          // Generowanie kuponów dla danego dnia
          byDate[date].forEach((c) => {
            let resultVal = "—";
            let resultColor = "#ffffff";

            if (c.status === "win") {
              resultVal = "+" + fmt(c.profit) + " zł";
              resultColor = "var(--win)";
            } else if (c.status === "lose") {
              resultVal = "-" + fmt(c.stake) + " zł";
              resultColor = "var(--lose)";
            }

            html += `
              <div class="coupon-card ${c.status}">
                <div class="cc-data-group">
                  <div class="cc-metric">
                    <div class="cc-lbl">Kurs</div>
                    <div class="cc-val">${c.odds.toFixed(2)}</div>
                  </div>
                  <div class="cc-metric">
                    <div class="cc-lbl">Stawka</div>
                    <div class="cc-val">${fmt(c.stake)} zł</div>
                  </div>
                  <div class="cc-metric" style="min-width: 100px;">
                    <div class="cc-lbl">Wynik</div>
                    <div class="cc-val" style="color: ${resultColor}">${resultVal}</div>
                  </div>
                </div>

                <div class="cc-actions-group">
                  <div class="status-actions">
                    <button class="btn-status ${c.status === "win" ? "active-win" : ""}" onclick="setStatus('${c.id}', 'win')">W</button>
                    <button class="btn-status ${c.status === "lose" ? "active-lose" : ""}" onclick="setStatus('${c.id}', 'lose')">L</button>
                    <button class="btn-status ${c.status === "pending" ? "active-pending" : ""}" onclick="setStatus('${c.id}', 'pending')">?</button>
                  </div>
                  <button class="btn-delete" onclick="deleteCoupon('${c.id}')">Usuń</button>
                </div>
              </div>
            `;
          });
        });

        container.innerHTML = html;
      }

      function toast(msg, type) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = "toast show " + (type || "");
        setTimeout(() => (el.className = "toast"), 2500);
      }

      function renderAll() {
        renderStats();
        renderCoupons();
      }

      renderAll();
    </script>
  </body>
</html>
